name: Build PETSS JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  build-petss:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run PETSS builder
        run: node scripts/build_petss_all.js

      - name: Commit JSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/petss_forecasts_all_mllw.json
          git diff --cached --quiet || git commit -m "Update PETSS forecasts"
          git push
