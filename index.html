<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NJ Tide Gauge Map — Live Obs + 72h PETSS Max</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    :root{
      --bg:#0b1220;
      --panel:#111a2e;
      --panel2:#0f172a;
      --text:#eaf0ff;
      --muted:#9fb0d1;
      --line:rgba(255,255,255,.10);
      --ok:#2dd4bf;
      --minor:#f59e0b;     /* orange */
      --moderate:#ef4444;  /* red */
      --major:#a855f7;     /* purple */
      --missing:#64748b;
      --accent:#60a5fa;
      --shadow:0 18px 50px rgba(0,0,0,.35);
      --radius:18px;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;padding:0;height:100%;
      background:var(--bg);color:var(--text);
      font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    .app{
      display:grid;
      grid-template-columns:390px 1fr;
      height:100vh;
      width:100vw;
    }

    .sidebar{
      background:linear-gradient(180deg, var(--panel), var(--panel2));
      border-right:1px solid var(--line);
      overflow:auto;
      padding:18px 16px 18px;
    }

    .title{
      margin:0 0 6px;
      font-size:28px;
      font-weight:900;
      letter-spacing:.2px;
    }

    .subtitle{
      margin:0 0 14px;
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }

    .pillRow{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .pill{
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      padding:8px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
    }

    .controls{
      display:grid;
      gap:10px;
      margin-bottom:14px;
    }

    .input,.select,.btn{
      width:100%;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      color:var(--text);
      border-radius:14px;
      padding:12px 13px;
      font-size:14px;
      font-weight:700;
      outline:none;
    }

    .btn{
      cursor:pointer;
      background:rgba(96,165,250,.14);
      border-color:rgba(96,165,250,.3);
    }

    .btn:hover{filter:brightness(1.06)}


    .legend{
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      border-radius:16px;
      padding:12px;
      margin-bottom:14px;
    }

    .legend h3{
      margin:0 0 10px;
      font-size:12px;
      text-transform:uppercase;
      color:var(--muted);
      letter-spacing:.18px;
    }

    .legendRow{
      display:flex;
      align-items:center;
      gap:8px;
      margin:6px 0;
      font-size:13px;
    }

    .swatch{
      width:12px;height:12px;border-radius:999px;display:inline-block;
      border:1px solid rgba(255,255,255,.25);
    }

    .gaugeList{
      display:grid;
      gap:10px;
    }

    .card{
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      border-radius:16px;
      padding:12px;
      cursor:pointer;
      transition:transform .12s ease, background .12s ease;
    }

    .card:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.06);
    }

    .card.active{
      outline:2px solid rgba(96,165,250,.55);
      background:rgba(96,165,250,.10);
    }

    .cardTitle{
      font-size:14px;
      font-weight:900;
      line-height:1.25;
    }

    .cardSub{
      color:var(--muted);
      font-size:12px;
      margin-top:4px;
    }

    .miniGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:10px;
    }

    .mini{
      border:1px solid var(--line);
      border-radius:12px;
      padding:8px;
      background:rgba(0,0,0,.14);
    }

    .mini .k{
      color:var(--muted);
      font-size:10px;
      text-transform:uppercase;
      font-weight:900;
      letter-spacing:.15px;
    }

    .mini .v{
      margin-top:4px;
      font-size:14px;
      font-weight:900;
    }

    #map{
      height:100%;
      width:100%;
      background:#0b1220;
    }

    .leaflet-popup-content-wrapper,
    .leaflet-popup-tip{
      background:#0f172a;
      color:var(--text);
      border:1px solid rgba(255,255,255,.10);
    }

    .popup{
      min-width:280px;
    }

    .popup h3{
      margin:0 0 6px;
      font-size:16px;
      line-height:1.2;
    }

    .popup .muted{
      color:var(--muted);
      font-size:12px;
      margin-bottom:8px;
    }

    .popupGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:8px;
    }

    .popupBox{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;
      padding:8px;
    }

    .popupBox .k{
      font-size:10px;
      color:var(--muted);
      text-transform:uppercase;
      font-weight:900;
      letter-spacing:.15px;
    }

    .popupBox .v{
      font-size:14px;
      font-weight:900;
      margin-top:4px;
    }

    .statusTag{
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-top:10px;
      padding:7px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04);
      font-size:12px;
      font-weight:900;
    }

    @media (max-width: 980px){
      .app{
        grid-template-columns:1fr;
        grid-template-rows:48vh 52vh;
      }
      .sidebar{
        border-right:none;
        border-bottom:1px solid var(--line);
      }
     
    }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <h1 class="title">NJ Tide Gauge Map</h1>
    <p class="subtitle">
      Click a marker or gauge card to see the <b>current water level</b> and the
      <b>predicted maximum over the next 72 hours</b>.
    </p>

    <div class="pillRow">
      <div class="pill" id="lastUpdated">Last updated: —</div>
      <div class="pill" id="statusPill">Loading…</div>
    </div>

    <div class="controls">
      <input id="searchBox" class="input" type="text" placeholder="Search gauge, acronym, or ID…" />
      <select id="sortMode" class="select">
        <option value="petss_desc">Sort by highest 72h max</option>
        <option value="obs_desc">Sort by highest current obs</option>
        <option value="name_asc">Sort A–Z</option>
      </select>
      <button id="refreshBtn" class="btn">Refresh</button>
    </div>

    <div class="legend">
      <h3>Marker color = 72h forecast stage</h3>
      <div class="legendRow"><span class="swatch" style="background:var(--ok)"></span> Below minor</div>
      <div class="legendRow"><span class="swatch" style="background:var(--minor)"></span> Minor</div>
      <div class="legendRow"><span class="swatch" style="background:var(--moderate)"></span> Moderate</div>
      <div class="legendRow"><span class="swatch" style="background:var(--major)"></span> Major</div>
      <div class="legendRow"><span class="swatch" style="background:var(--missing)"></span> Missing PETSS</div>
    </div>

    <div id="gaugeList" class="gaugeList"></div>
  </aside>

  <main id="map"></main>
</div>

let rows = [];
let markerMap = new Map();
let listSelection = null;
let petssAll = null;

const fmtFull = new Intl.DateTimeFormat("en-US", {
  timeZone: "America/New_York",
  year: "numeric",
  month: "short",
  day: "2-digit",
  hour: "2-digit",
  minute: "2-digit",
  hour12: true
});

function fmtET(iso){
  if(!iso) return "—";
  const d = new Date(iso);
  return isNaN(d) ? "—" : fmtFull.format(d);
}
function fmtFt(v){
  return Number.isFinite(v) ? `${v.toFixed(2)} ft` : "—";
}
function cleanId(v){
  if(v === null || v === undefined) return null;
  const s = String(v).replace(/\u00A0/g, " ").trim();
  if(!s || s.toUpperCase() === "N/A") return null;
  return s;
}
function esc(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;");
}
function setStatus(msg){
  document.getElementById("statusPill").textContent = msg;
}
function toIsoFromNoaaTime(t){
  return t ? new Date(t.replace(" ", "T") + "Z").toISOString() : null;
}
function markerColorForRow(r){
  if(!Number.isFinite(r.petssValue)) return getComputedStyle(document.documentElement).getPropertyValue("--missing").trim();
  if(r.petssValue >= r.major) return getComputedStyle(document.documentElement).getPropertyValue("--major").trim();
  if(r.petssValue >= r.moderate) return getComputedStyle(document.documentElement).getPropertyValue("--moderate").trim();
  if(r.petssValue >= r.minor) return getComputedStyle(document.documentElement).getPropertyValue("--minor").trim();
  return getComputedStyle(document.documentElement).getPropertyValue("--ok").trim();
}
function stageLabel(r){
  if(!Number.isFinite(r.petssValue)) return "No PETSS forecast loaded";
  if(r.petssValue >= r.major) return "Major flood stage";
  if(r.petssValue >= r.moderate) return "Moderate flood stage";
  if(r.petssValue >= r.minor) return "Minor flood stage";
  return "Below minor flood stage";
}
async function fetchJSON(url){
  const res = await fetch(url, { cache:"no-store" });
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

const map = L.map("map", { zoomControl:true }).setView([39.95, -74.65], 8);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 18,
  attribution: "&copy; OpenStreetMap contributors"
}).addTo(map);

function createGaugeIcon(color){
  return L.divIcon({
    className: "",
    html: `
      <div style="
        width:18px;height:18px;border-radius:999px;
        background:${color};
        border:2px solid rgba(255,255,255,.95);
        box-shadow:0 0 0 3px rgba(0,0,0,.20);
      "></div>
    `,
    iconSize:[18,18],
    iconAnchor:[9,9],
    popupAnchor:[0,-10]
  });
}

function popupHtml(r){
  const stage = stageLabel(r);
  const color = markerColorForRow(r);

  return `
    <div class="popup">
      <h3>${esc(r.name)}</h3>
      <div class="muted">${esc(r.acronym || "—")}</div>

      <div class="popupGrid">
        <div class="popupBox">
          <div class="k">Current height</div>
          <div class="v">${esc(fmtFt(r.obsValue))}</div>
        </div>
        <div class="popupBox">
          <div class="k">Obs time</div>
          <div class="v">${esc(fmtET(r.obsTime))}</div>
        </div>
        <div class="popupBox">
          <div class="k">72h max forecast</div>
          <div class="v">${esc(fmtFt(r.petssValue))}</div>
        </div>
        <div class="popupBox">
          <div class="k">Peak time</div>
          <div class="v">${esc(fmtET(r.petssTime))}</div>
        </div>
      </div>

      <div class="statusTag">
        <span style="width:10px;height:10px;border-radius:999px;background:${color};display:inline-block"></span>
        ${esc(stage)}
      </div>

      <div style="margin-top:10px;font-size:12px;color:#9fb0d1;line-height:1.45">
        PETSS ID: <b>${esc(r.petssId || "—")}</b><br>
        Minor / Moderate / Major: <b>${esc(fmtFt(r.minor))}</b> / <b>${esc(fmtFt(r.moderate))}</b> / <b>${esc(fmtFt(r.major))}</b>
      </div>

      ${r.link ? `<div style="margin-top:10px"><a href="${esc(r.link)}" target="_blank" rel="noopener noreferrer" style="color:#60a5fa;font-weight:800">Open gauge page</a></div>` : ``}
    </div>
  `;
}

function buildMarkers(filteredRows){
  markerMap.forEach(marker => map.removeLayer(marker));
  markerMap.clear();

  const bounds = [];

  filteredRows.forEach(r => {
    if(!Number.isFinite(r.lat) || !Number.isFinite(r.lon)) return;

    const marker = L.marker([r.lat, r.lon], {
      icon: createGaugeIcon(markerColorForRow(r))
    }).addTo(map);

    marker.bindPopup(popupHtml(r), { maxWidth: 320 });

    marker.on("click", () => {
      listSelection = r.name;
      renderList();
    });

    markerMap.set(r.name, marker);
    bounds.push([r.lat, r.lon]);
  });

  if(bounds.length){
    map.fitBounds(bounds, { padding:[30,30] });
  }
}

async function fetchNOAALatest(noaaId){
  const station = cleanId(noaaId);
  if(!station) return { value:null, time:null, source:"NOAA" };

  const url =
    `https://api.tidesandcurrents.noaa.gov/api/prod/datagetter` +
    `?date=latest` +
    `&station=${encodeURIComponent(station)}` +
    `&product=water_level` +
    `&datum=${NOAA_DATUM}` +
    `&time_zone=${NOAA_TZ}` +
    `&units=${NOAA_UNITS}` +
    `&application=${encodeURIComponent(APP_NAME)}` +
    `&format=json`;

  const json = await fetchJSON(url);
  const arr = json?.data || [];
  if(!arr.length) return { value:null, time:null, source:"NOAA" };

  const last = arr[arr.length - 1];
  return {
    value: Number(last?.v),
    time: toIsoFromNoaaTime(last?.t),
    source:"NOAA"
  };
}

async function fetchUSGSBatch(siteIds){
  const ids = siteIds.map(cleanId).filter(Boolean);
  if(!ids.length) return new Map();

  const url =
    `https://waterservices.usgs.gov/nwis/iv/?format=json` +
    `&sites=${ids.join(",")}` +
    `&parameterCd=${USGS_PARAM}` +
    `&siteStatus=all`;

  const json = await fetchJSON(url);
  const out = new Map();
  const series = json?.value?.timeSeries || [];

  for(const ts of series){
    const siteCode = cleanId(ts?.sourceInfo?.siteCode?.[0]?.value);
    const values = ts?.values?.[0]?.value || [];
    if(!siteCode || !values.length) continue;

    const last = values[values.length - 1];
    out.set(siteCode, {
      value: Number(last?.value),
      time: last?.dateTime || null,
      source:"USGS"
    });
  }
  return out;
}

function normalizePetssPoints(raw){
  if(!raw) return [];

  const arr =
    Array.isArray(raw?.points) ? raw.points :
    Array.isArray(raw?.data) ? raw.data :
    Array.isArray(raw?.forecast) ? raw.forecast :
    Array.isArray(raw) ? raw : [];

  return arr
    .map(p => ({
      t: p?.t ?? p?.time ?? p?.validTime ?? p?.datetime ?? null,
      ft: Number(p?.fcst ?? p?.value ?? p?.twl ?? p?.primary ?? p?.height)
    }))
    .filter(p => {
      if(!p.t || !Number.isFinite(p.ft)) return false;
      const ms = new Date(p.t).getTime();
      if(!Number.isFinite(ms)) return false;
      if(p.ft < -20 || p.ft > 25) return false;
      return true;
    })
    .sort((a,b) => new Date(a.t).getTime() - new Date(b.t).getTime());
}

async function fetchPetssAll(){
  const json = await fetchJSON(`${PETSS_ALL_JSON}?v=${Date.now()}`);
  return json;
}

function getPetssRecordById(allJson, petssId){
  const id = cleanId(petssId);
  if(!allJson || !id) return null;

  if(allJson.stations && allJson.stations[id]) return allJson.stations[id];
  if(allJson[id]) return allJson[id];

  return null;
}

function getPetss72hMax(allJson, petssId){
  const rec = getPetssRecordById(allJson, petssId);
  if(!rec){
    return { value:null, time:null, issuedTime:null };
  }

  const issuedTime =
    rec.model_time_utc ||
    rec.issued_utc ||
    rec.fetched_utc ||
    rec.issuedTime ||
    allJson.model_time_utc ||
    allJson.issued_utc ||
    null;

  const points = normalizePetssPoints(rec);
  if(!points.length){
    return { value:null, time:null, issuedTime };
  }

  const now = Date.now();
  const end = now + 72 * 3600 * 1000;

  const inWindow = points.filter(p => {
    const t = new Date(p.t).getTime();
    return Number.isFinite(t) && t >= now && t <= end;
  });

  if(!inWindow.length){
    return { value:null, time:null, issuedTime };
  }

  let maxPt = inWindow[0];
  for(const p of inWindow){
    if(p.ft > maxPt.ft) maxPt = p;
  }

  return {
    value: maxPt.ft,
    time: maxPt.t,
    issuedTime
  };
}

async function loadPage(){
  setStatus("Loading…");

  try{
    const usgsIds = GAUGES
      .filter(g => g.sheet === "USGS" && cleanId(g.usgsId))
      .map(g => cleanId(g.usgsId));

    const noaaObsRows = GAUGES.filter(g => g.sheet === "NOAA" || !cleanId(g.usgsId));

    const usgsPromise = fetchUSGSBatch(usgsIds);
    const petssPromise = fetchPetssAll();

    const noaaObsMap = new Map();
    await Promise.all(noaaObsRows.map(async g => {
      try{
        noaaObsMap.set(g.name, await fetchNOAALatest(g.noaaId));
      }catch(err){
        console.error("NOAA obs failed:", g.name, err);
        noaaObsMap.set(g.name, { value:null, time:null, source:"NOAA" });
      }
    }));

    const usgsObsMap = await usgsPromise;
    petssAll = await petssPromise;

    rows = GAUGES.map(g => {
      let obs;
      if(g.sheet === "USGS" && cleanId(g.usgsId)){
        obs = usgsObsMap.get(cleanId(g.usgsId)) || { value:null, time:null, source:"USGS" };
      } else {
        obs = noaaObsMap.get(g.name) || { value:null, time:null, source:"NOAA" };
      }

      const petss = getPetss72hMax(petssAll, g.petssId);

      return {
        ...g,
        obsValue: obs.value,
        obsTime: obs.time,
        obsSource: obs.source,
        petssValue: petss.value,
        petssTime: petss.time,
        petssIssued: petss.issuedTime
      };
    });

    document.getElementById("lastUpdated").textContent = `Last updated: ${fmtET(new Date().toISOString())}`;
    setStatus("Live");
    render();
  } catch(err){
    console.error(err);
    setStatus("Load failed");
    rows = GAUGES.map(g => ({
      ...g,
      obsValue:null,
      obsTime:null,
      obsSource:g.sheet === "USGS" && cleanId(g.usgsId) ? "USGS" : "NOAA",
      petssValue:null,
      petssTime:null,
      petssIssued:null
    }));
    render();
  }
}

function getFilteredRows(){
  const q = document.getElementById("searchBox").value.trim().toLowerCase();
  const sortMode = document.getElementById("sortMode").value;

  let filtered = rows.filter(r => {
    const hay = [
      r.name, r.acronym, r.sheet,
      cleanId(r.usgsId) || "",
      cleanId(r.noaaId) || "",
      cleanId(r.petssId) || ""
    ].join(" ").toLowerCase();

    return !q || hay.includes(q);
  });

  filtered.sort((a,b) => {
    if(sortMode === "name_asc") return a.name.localeCompare(b.name);
    if(sortMode === "obs_desc") return (b.obsValue ?? -999) - (a.obsValue ?? -999);
    return (b.petssValue ?? -999) - (a.petssValue ?? -999);
  });

  return filtered;
}

function renderList(){
  const filtered = getFilteredRows();
  const el = document.getElementById("gaugeList");

  el.innerHTML = filtered.map(r => {
    const isActive = listSelection === r.name;
    return `
      <div class="card ${isActive ? "active" : ""}" data-name="${esc(r.name)}">
        <div class="cardTitle">${esc(r.name)}</div>
        <div class="cardSub">${esc(r.acronym || "—")}</div>

        <div class="miniGrid">
          <div class="mini">
            <div class="k">Current</div>
            <div class="v">${esc(fmtFt(r.obsValue))}</div>
          </div>
          <div class="mini">
            <div class="k">72h max</div>
            <div class="v">${esc(fmtFt(r.petssValue))}</div>
          </div>
        </div>
      </div>
    `;
  }).join("");

  el.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", () => {
      const name = card.getAttribute("data-name");
      listSelection = name;
      renderList();

      const marker = markerMap.get(name);
      if(marker){
        map.setView(marker.getLatLng(), Math.max(map.getZoom(), 9), { animate:true });
        marker.openPopup();
      }
    });
  });
}


function render(){
  const filtered = getFilteredRows();
  buildMarkers(filtered);
  renderList();
}

document.getElementById("searchBox").addEventListener("input", render);
document.getElementById("sortMode").addEventListener("change", render);
document.getElementById("refreshBtn").addEventListener("click", loadPage);

loadPage();
setInterval(loadPage, REFRESH_MS);
</script>
